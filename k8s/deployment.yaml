apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-alertas
  namespace: muni-valle-sol
  labels:
    app: ms-alertas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-alertas
  template:
    metadata:
      labels:
        app: ms-alertas
    spec:
      containers:
        - name: ms-alertas
          image: lsn33/muni-valle-sol-ms-alertas:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: muni-secrets
                  key: mongo-uri
            - name: SPRING_APPLICATION_NAME
              value: "ms-alertas"
            - name: SERVER_PORT
              value: "8083"
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
